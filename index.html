<title>ZedGrade — Zambian Academic Tracker</title>

*, *::before, *::after { box-sizing: border-box; }
html, body { 
  margin: 0; 
  padding: 0; 
  background-color: #FBF8F0; 
  color: #211D18;
  font-family: 'Inter', sans-serif; 
}
button { touch-action: manipulation; cursor: pointer; border: none; font-family: inherit; }
#root { min-height: 100vh; }
#zg-fallback { font-family: sans-serif; max-width: 520px; margin: 60px auto; padding: 24px; line-height:1.6; color:#211D18; }

/* Print Mode Styling */
@media print {
  body { background: white; color: black; }
  .no-print { display: none !important; }
  .print-only { display: block !important; }
  .card { border: none !important; box-shadow: none !important; }
}
</style>
</head>
<body>
<div id="root">
  <div id="zg-fallback">Loading ZedGrade… if this message does not disappear within a few seconds, check your internet connection and open the browser console for details.</div>
</div>

<script>
window.addEventListener('error', function (e) {
  var el = document.getElementById('root');
  if (el) {
    el.innerHTML = '<div id="zg-fallback"><strong>Something went wrong loading ZedGrade.</strong><br/>Error: ' +
    (e.message || 'unknown error') + '<br/><br/>Try refreshing the page, or check that you are connected to the internet.</div>';
  }
});
</script>

/* ECZ GRADING SYSTEM SCHEME */
const ECZ_SUBJECTS = [
  "English Language", "Mathematics", "Biology", "Science (Phy/Chem)",
  "Civic Education", "History", "Geography", "Religious Education",
  "Commerce", "Principles of Accounts", "Agricultural Science", "Computer Studies"
];

function getECZGrade(mark) {
  if (mark >= 75) return { grade: "Distinction", code: 1, points: 1 };
  if (mark >= 70) return { grade: "Distinction", code: 2, points: 2 };
  if (mark >= 65) return { grade: "Merit", code: 3, points: 3 };
  if (mark >= 60) return { grade: "Merit", code: 4, points: 4 };
  if (mark >= 55) return { grade: "Credit", code: 5, points: 5 };
  if (mark >= 50) return { grade: "Credit", code: 6, points: 6 };
  if (mark >= 45) return { grade: "Satisfactory", code: 7, points: 7 };
  if (mark >= 40) return { grade: "Satisfactory", code: 8, points: 8 };
  return { grade: "Unsatisfactory", code: 9, points: 9 };
}
